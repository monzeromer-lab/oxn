<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>oxn dashboard</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0e0e12; --fg: #eaeaf0; --muted: #8b8ea0;
      --card: #1a1a22; --accent: #7c8cff; --danger: #f07178;
      --ok: #7bd389; --warn: #f5c969;
      --border: #2a2a36;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg:#f7f7fb; --fg:#16161d; --muted:#5b5f75; --card:#fff; --border:#dcdce6; }
    }
    * { box-sizing: border-box; }
    html, body { background: var(--bg); color: var(--fg); margin: 0; font: 14px/1.5 system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border); display:flex; align-items:center; gap:16px; }
    header h1 { font-size: 16px; margin: 0; letter-spacing: 0.5px; }
    header .tag { font-size: 11px; color: var(--muted); padding: 2px 8px; border: 1px solid var(--border); border-radius: 10px; }
    main { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 58px); }
    nav { border-right: 1px solid var(--border); padding: 12px 0; overflow-y: auto; }
    nav .q { padding: 10px 20px; cursor: pointer; display: flex; justify-content: space-between; gap: 8px; border-left: 2px solid transparent; }
    nav .q:hover { background: var(--card); }
    nav .q.active { border-color: var(--accent); background: var(--card); }
    nav .q small { color: var(--muted); }
    nav .q.paused::after { content: 'paused'; font-size: 10px; color: var(--warn); }
    section { padding: 18px 24px; }
    .counts { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
    .card b { font-size: 20px; display: block; }
    .card small { color: var(--muted); text-transform: uppercase; font-size: 10px; letter-spacing: 0.8px; }
    .card.selected { border-color: var(--accent); }
    .card button { cursor: pointer; background: none; border: 0; color: inherit; padding: 0; text-align: left; display: block; width: 100%; }
    .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    button.btn { background: var(--accent); color: white; border: 0; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 12px; }
    button.btn.ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); }
    button.btn.danger { background: var(--danger); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; }
    tr:hover { background: var(--card); }
    code { font-family: ui-monospace, SFMono-Regular, monospace; color: var(--accent); }
    .pill { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; border: 1px solid var(--border); }
    .pill.completed { color: var(--ok); border-color: var(--ok); }
    .pill.failed { color: var(--danger); border-color: var(--danger); }
    .pill.active { color: var(--accent); border-color: var(--accent); }
    .pill.delayed { color: var(--warn); border-color: var(--warn); }
    .pill.waiting { color: var(--muted); }
    .empty { padding: 40px; text-align: center; color: var(--muted); }
    .reason { color: var(--danger); font-size: 12px; }
    tr.row { cursor: pointer; }

    /* Job detail drawer */
    .drawer-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: none; z-index: 50;
    }
    .drawer-backdrop.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: 0; height: 100vh; width: min(640px, 100vw);
      background: var(--bg); border-left: 1px solid var(--border);
      z-index: 51; transform: translateX(100%); transition: transform .15s ease-out;
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .drawer header h2 { margin: 0; font-size: 14px; }
    .drawer header .spacer { flex: 1; }
    .drawer .body { padding: 16px 18px; overflow: auto; flex: 1; }
    .drawer .body h3 {
      margin: 18px 0 6px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--muted); font-weight: 600;
    }
    .drawer .body h3:first-child { margin-top: 0; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 18px; font-size: 13px; }
    .stats .k { color: var(--muted); }
    .stats .v { word-break: break-all; }
    pre.code {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; font-size: 12px; overflow: auto; margin: 0;
      font-family: ui-monospace, SFMono-Regular, monospace; max-height: 280px;
      white-space: pre-wrap; word-break: break-word;
    }
    .logs {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; font-size: 12px; overflow: auto;
      font-family: ui-monospace, SFMono-Regular, monospace; max-height: 320px;
      white-space: pre-wrap;
    }
    .logs .line { padding: 2px 0; border-bottom: 1px dotted var(--border); }
    .logs .line:last-child { border-bottom: 0; }
    .drawer .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <header>
    <h1>oxn</h1>
    <span class="tag" id="base">/</span>
    <span style="flex:1"></span>
    <button class="btn ghost" onclick="refresh()">Refresh</button>
  </header>
  <main>
    <nav id="queues"></nav>
    <section id="detail"><div class="empty">Select a queue to begin.</div></section>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop" onclick="closeJob()"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <header>
      <h2 id="drawerTitle">Job</h2>
      <span class="spacer"></span>
      <button class="btn ghost" onclick="reloadJob()">Refresh</button>
      <button class="btn ghost" onclick="closeJob()">Close</button>
    </header>
    <div class="body" id="drawerBody"></div>
  </aside>
  <script>
    const STATES = ['waiting','active','delayed','prioritized','completed','failed','paused','waiting-children'];
    let BASE = '';
    let selectedQueue = null;
    let selectedState = 'waiting';
    let openJobId = null;

    // Auto-detect base path: this file is served at the dashboard root.
    (function detectBase() {
      const p = window.location.pathname;
      BASE = p.endsWith('/') ? p.slice(0, -1) : p.replace(/\/[^/]+$/, '');
      document.getElementById('base').textContent = BASE || '/';
    })();

    async function api(path, opts) {
      const res = await fetch(BASE + path, opts);
      if (!res.ok) throw new Error(await res.text());
      if (res.status === 204) return null;
      return res.json();
    }

    async function refresh() {
      const queues = await api('/api/queues');
      const nav = document.getElementById('queues');
      nav.innerHTML = '';
      for (const q of queues) {
        const total = Object.values(q.counts).reduce((a,b)=>a+b,0);
        const el = document.createElement('div');
        el.className = 'q' + (q.paused ? ' paused' : '') + (selectedQueue === q.name ? ' active' : '');
        el.innerHTML = `<span>${q.name}</span><small>${total}</small>`;
        el.onclick = () => { selectedQueue = q.name; render(); };
        nav.appendChild(el);
      }
      if (selectedQueue) await render();
    }

    async function render() {
      const q = selectedQueue;
      if (!q) return;
      const counts = await api('/api/queues/' + encodeURIComponent(q) + '/counts');
      const detail = document.getElementById('detail');
      detail.innerHTML = `
        <h2 style="margin-top:0">${q}</h2>
        <div class="toolbar">
          <button class="btn ghost" onclick="pause('${q}')">Pause</button>
          <button class="btn ghost" onclick="resume('${q}')">Resume</button>
          <button class="btn danger" onclick="drain('${q}')">Drain</button>
        </div>
        <div class="counts">
          ${STATES.map(s => {
            const key = s.replace('-','_');
            const n = counts[key] ?? 0;
            return `<div class="card ${selectedState === s ? 'selected' : ''}">
              <button onclick="pickState('${s}')">
                <small>${s}</small>
                <b>${n}</b>
              </button>
            </div>`;
          }).join('')}
        </div>
        <div id="jobs"></div>
      `;
      await renderJobs();
    }

    function stateActions(q, state, total) {
      // Bulk actions that depend on the currently-selected state. Empty
      // string for states where bulk operations don't make sense.
      if (state === 'completed' || state === 'failed') {
        if (!total) return '';
        return `<button class="btn danger" onclick="cleanState('${q}','${state}',${total})">Clean ${total} ${state}</button>`;
      }
      if (state === 'delayed') {
        const help = `<span style="color:var(--muted);font-size:11px;margin-left:8px">Jobs sit in <em>delayed</em> when the producer asked for a delay, when a handler returned <code>Error::Delayed</code>/<code>RateLimited</code>, when a retry is waiting for backoff, or when the scheduler queued them for a future fire time.</span>`;
        if (!total) return help;
        return `<button class="btn ghost" onclick="promoteAllDelayed('${q}',${total})">Promote all ${total}</button>` + help;
      }
      return '';
    }

    async function renderJobs() {
      const q = selectedQueue;
      const res = await api(`/api/queues/${encodeURIComponent(q)}/jobs?state=${selectedState}&start=0&end=49&desc=true`);
      const out = document.getElementById('jobs');
      const actions = stateActions(q, selectedState, res.total);
      const actionsBar = actions
        ? `<div class="toolbar" style="margin-bottom:10px">${actions}</div>`
        : '';
      if (!res.jobs.length) {
        out.innerHTML = `${actionsBar}<div class="empty">No ${selectedState} jobs.</div>`;
        return;
      }
      out.innerHTML = `${actionsBar}
        <table>
          <thead><tr>
            <th>ID</th><th>Name</th><th>State</th><th>Attempts</th><th>Created</th><th>Finished</th><th></th>
          </tr></thead>
          <tbody>
            ${res.jobs.map(j => `
              <tr class="row" onclick="openJob('${q}','${escapeAttr(j.id)}')">
                <td><code>${j.id}</code></td>
                <td>${j.name}</td>
                <td><span class="pill ${j.state}">${j.state ?? '-'}</span></td>
                <td>${j.attempts_made} / ${j.attempts_total}</td>
                <td>${new Date(j.timestamp_ms).toISOString().slice(0,19).replace('T',' ')}</td>
                <td>${j.finished_on_ms ? new Date(j.finished_on_ms).toISOString().slice(0,19).replace('T',' ') : '-'}</td>
                <td onclick="event.stopPropagation()">
                  ${j.state === 'failed' ? `<button class="btn ghost" onclick="retryJob('${q}','${j.id}')">Retry</button>` : ''}
                  ${j.state === 'delayed' ? `<button class="btn ghost" onclick="promoteJob('${q}','${j.id}')">Promote</button>` : ''}
                  <button class="btn danger" onclick="removeJob('${q}','${j.id}')">Remove</button>
                </td>
              </tr>
              ${j.failed_reason ? `<tr><td colspan="7" class="reason">${j.failed_reason}</td></tr>` : ''}
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
    function fmtTs(ms) { return ms ? new Date(ms).toISOString().slice(0,19).replace('T',' ') : '-'; }
    function fmtJson(s) {
      if (s == null || s === '') return '<em style="color:var(--muted)">none</em>';
      try { return `<pre class="code">${escapeHtml(JSON.stringify(JSON.parse(s), null, 2))}</pre>`; }
      catch { return `<pre class="code">${escapeHtml(s)}</pre>`; }
    }

    async function openJob(q, id) {
      openJobId = id;
      const drawer = document.getElementById('drawer');
      const backdrop = document.getElementById('drawerBackdrop');
      drawer.classList.add('open');
      backdrop.classList.add('open');
      drawer.setAttribute('aria-hidden', 'false');
      document.getElementById('drawerTitle').textContent = `Job ${id}`;
      document.getElementById('drawerBody').innerHTML = `<div class="empty">Loading…</div>`;
      await renderJob(q, id);
    }

    function closeJob() {
      openJobId = null;
      const drawer = document.getElementById('drawer');
      const backdrop = document.getElementById('drawerBackdrop');
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
      drawer.setAttribute('aria-hidden', 'true');
    }

    async function reloadJob() {
      if (selectedQueue && openJobId) await renderJob(selectedQueue, openJobId);
    }

    async function renderJob(q, id) {
      const body = document.getElementById('drawerBody');
      let job, logs;
      try {
        [job, logs] = await Promise.all([
          api(`/api/queues/${encodeURIComponent(q)}/jobs/${encodeURIComponent(id)}`),
          api(`/api/queues/${encodeURIComponent(q)}/jobs/${encodeURIComponent(id)}/logs?desc=false`).catch(() => ({logs: [], count: 0})),
        ]);
      } catch (e) {
        body.innerHTML = `<div class="empty">Failed to load: ${escapeHtml(e.message)}</div>`;
        return;
      }
      if (!job) {
        body.innerHTML = `<div class="empty">Job not found.</div>`;
        return;
      }
      const stateClass = job.state || 'waiting';
      const durMs = (job.processed_on_ms && job.finished_on_ms) ? (job.finished_on_ms - job.processed_on_ms) : null;
      body.innerHTML = `
        <div class="actions">
          ${job.state === 'failed' ? `<button class="btn ghost" onclick="retryJob('${q}','${escapeAttr(job.id)}'); reloadJob();">Retry</button>` : ''}
          ${job.state === 'delayed' ? `<button class="btn ghost" onclick="promoteJob('${q}','${escapeAttr(job.id)}'); reloadJob();">Promote</button>` : ''}
          <button class="btn danger" onclick="removeJob('${q}','${escapeAttr(job.id)}'); closeJob();">Remove</button>
        </div>

        <h3>Stats</h3>
        <div class="stats">
          <div class="k">ID</div><div class="v"><code>${escapeHtml(job.id)}</code></div>
          <div class="k">Name</div><div class="v">${escapeHtml(job.name)}</div>
          <div class="k">State</div><div class="v"><span class="pill ${stateClass}">${escapeHtml(job.state ?? '-')}</span></div>
          <div class="k">Attempts</div><div class="v">${job.attempts_made} / ${job.opts?.attempts ?? '?'}</div>
          <div class="k">Priority</div><div class="v">${job.opts?.priority ?? 0}</div>
          <div class="k">Created</div><div class="v">${fmtTs(job.timestamp_ms)}</div>
          <div class="k">Started</div><div class="v">${fmtTs(job.processed_on_ms)}</div>
          <div class="k">Finished</div><div class="v">${fmtTs(job.finished_on_ms)}</div>
          <div class="k">Duration</div><div class="v">${durMs != null ? durMs + ' ms' : '-'}</div>
          <div class="k">Lock token</div><div class="v">${job.lock_token ? `<code>${escapeHtml(job.lock_token)}</code>` : '-'}</div>
          <div class="k">Remove on complete</div><div class="v">${escapeHtml(JSON.stringify(job.opts?.remove_on_complete ?? 'Keep'))}</div>
          <div class="k">Remove on fail</div><div class="v">${escapeHtml(JSON.stringify(job.opts?.remove_on_fail ?? 'Keep'))}</div>
        </div>

        <h3>Data</h3>
        ${fmtJson(job.data)}

        <h3>Progress</h3>
        ${fmtJson(job.progress_json)}

        <h3>Return value</h3>
        ${fmtJson(job.return_value_json)}

        ${job.failed_reason ? `<h3>Failed reason</h3><pre class="code reason">${escapeHtml(job.failed_reason)}</pre>` : ''}
        ${job.stacktrace && job.stacktrace.length ? `<h3>Stack trace</h3><pre class="code">${escapeHtml(job.stacktrace.join('\n\n'))}</pre>` : ''}

        <h3>Logs <small style="color:var(--muted);font-weight:400">(${logs.count})</small></h3>
        ${logs.count
          ? `<div class="logs">${logs.logs.map(l => `<div class="line">${escapeHtml(l)}</div>`).join('')}</div>`
          : `<div style="color:var(--muted);font-size:12px">No log lines.</div>`}
      `;
    }

    function pickState(s) { selectedState = s; render(); }

    async function pause(q) { await api(`/api/queues/${encodeURIComponent(q)}/pause`, {method:'POST'}); refresh(); }
    async function resume(q) { await api(`/api/queues/${encodeURIComponent(q)}/resume`, {method:'POST'}); refresh(); }
    async function drain(q) {
      if (!confirm('Drain ' + q + '? This removes pending + prioritized jobs.')) return;
      await api(`/api/queues/${encodeURIComponent(q)}/drain`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({include_delayed:false})});
      refresh();
    }
    async function retryJob(q, id) { await api(`/api/queues/${encodeURIComponent(q)}/jobs/${id}/retry`, {method:'POST'}); renderJobs(); }
    async function promoteJob(q, id) { await api(`/api/queues/${encodeURIComponent(q)}/jobs/${id}/promote`, {method:'POST'}); renderJobs(); }
    async function removeJob(q, id) {
      if (!confirm('Remove job ' + id + '?')) return;
      await api(`/api/queues/${encodeURIComponent(q)}/jobs/${id}/remove`, {method:'POST'});
      renderJobs();
    }

    async function cleanState(q, state, total) {
      if (!confirm(`Clean ${total} ${state} job${total === 1 ? '' : 's'} from "${q}"? Their hashes, logs, and dependency keys are deleted.`)) return;
      const res = await api(
        `/api/queues/${encodeURIComponent(q)}/clean/${encodeURIComponent(state)}`,
        { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ limit: 0 }) },
      );
      refresh();
      console.info('cleaned', res?.count, state, 'jobs');
    }

    async function promoteAllDelayed(q, total) {
      if (!confirm(`Promote all ${total} delayed job${total === 1 ? '' : 's'} on "${q}" to wait?`)) return;
      const res = await api(
        `/api/queues/${encodeURIComponent(q)}/promote-all`,
        { method:'POST' },
      );
      refresh();
      console.info('promoted', res?.count, 'delayed jobs');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeJob(); });

    refresh();
    setInterval(async () => {
      await refresh();
      if (openJobId && selectedQueue) await renderJob(selectedQueue, openJobId);
    }, 5000);
  </script>
</body>
</html>
